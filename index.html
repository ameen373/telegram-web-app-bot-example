<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معرض أمين للمقتنيات الملكية</title>
    <style>
        body { font-family: sans-serif; background-color: #1a202c; color: white; text-align: center; padding: 20px; }
        .container { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin-top: 30px; }
        .card { background: #2d3748; padding: 15px; border-radius: 15px; width: 150px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .card img { width: 100%; border-radius: 10px; height: 120px; object-fit: cover; }
        h1 { color: #edf2f7; }
        .price { color: #f6e05e; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>💎 معرض أمين للمقتنيات الملكية 💎</h1>
    
    <div class="container">
        <div class="card">
            <img src="input.jpg" alt="ذو الفقار">
            <p>ذو الفقار</p>
            <div class="price">100 ⭐</div>
        </div>

        <div class="card">
            <img src="input.jpg" alt="خاتم عقيق">
            <p>خاتم عقيق</p>
            <div class="price">50 ⭐</div>
        </div>
    </div>
</body>
</html>
