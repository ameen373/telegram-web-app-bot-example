<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
  // إعدادات Firebase من واقع مشروعك
  const firebaseConfig = {
    databaseURL: "https://telega-io-default-rtdb.firebaseio.com/"
  };
  firebase.initializeApp(firebaseConfig);
  const database = firebase.database();

  // وظيفة البث العالمي (Broadcast)
  function sendBroadcast() {
    const msg = document.querySelector('textarea').value; // يأخذ النص من خانة البث
    if (msg) {
      database.ref('global_notification').set({
        msg: msg,
        time: Date.now()
      }).then(() => {
        alert("✅ تم إرسال البث العالمي بنجاح!");
      });
    } else {
      alert("⚠️ يرجى كتابة رسالة أولاً");
    }
  }

  // وظيفة شحن المحفظة (نظام الضمان)
  function depositAction() {
    const userId = prompt("أدخل معرف المستخدم (ID):");
    const amount = prompt("أدخل المبلغ (USDT):");
    if (userId && amount) {
      database.ref('wallets/' + userId).update({
        balance: parseFloat(amount),
        status: "verified"
      }).then(() => {
        alert("💰 تم تحديث الرصيد بنجاح");
      });
    }
  }

  // ربط الأزرار الموجودة في تصميمك بالأوامر البرمجية
  document.querySelector('.btn-primary').onclick = sendBroadcast; // زر إطلاق البث
  document.querySelector('.btn-success').onclick = depositAction; // زر شحن المحفظة
</script>
