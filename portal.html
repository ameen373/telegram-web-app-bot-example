<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telega-IO Pro</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        /* أضف تنسيقاتك هنا لضمان عدم ظهور شاشة سوداء فارغة */
        body { background-color: #1a1a2e; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .card { border: 1px solid #e94560; border-radius: 15px; padding: 20px; margin-bottom: 20px; }
        button { background-color: #0f3460; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="card">
        <h3>🚀 مركز قيادة أمين (Te_Bit)</h3>
        <textarea id="broadcastMsg" placeholder="بث رسالة عالمية للمنصة..." style="width: 90%; height: 60px;"></textarea><br><br>
        <button onclick="sendBroadcast()">إطلاق البث 🚀</button>
    </div>

    <div class="card">
        <p>الرصيد المتاح (نظام الضمان 🛡️)</p>
        <h2 id="balanceDisplay">USDT 0.00</h2>
        <button onclick="depositAction()" style="background-color: #28a745;">شحن المحفظة</button>
    </div>

    <script>
        // إعدادات Firebase الخاصة بك
        const firebaseConfig = {
            databaseURL: "https://telega-io-default-rtdb.firebaseio.com/"
        };
        
        // تشغيل النظام فقط إذا تم تحميل المكتبات بنجاح
        try {
            firebase.initializeApp(firebaseConfig);
            const database = firebase.database();

            // وظيفة البث العالمي
            window.sendBroadcast = function() {
                const msg = document.getElementById('broadcastMsg').value;
                if (msg) {
                    database.ref('global_notification').set({
                        msg: msg,
                        time: Date.now()
                    }).then(() => alert("✅ تم إرسال البث لجميع المستخدمين!"));
                }
            };

            // وظيفة تحديث الرصيد
            window.depositAction = function() {
                const uid = prompt("أدخل ID المستخدم:");
                const amt = prompt("المبلغ المراد شحنه:");
                if (uid && amt) {
                    database.ref('wallets/' + uid).update({
                        balance: parseFloat(amt)
                    }).then(() => alert("💰 تم تحديث الرصيد!"));
                }
            };
        } catch (e) {
            console.error("Firebase Error:", e);
            document.body.innerHTML = "<h1>خطأ في التحميل: يرجى التأكد من اتصال الإنترنت</h1>";
        }
    </script>
</body>
</html>
