<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Telega-IO Extreme v3 - Ameen</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        :root {
            --bg: #0b0f1a; --card: rgba(23, 32, 51, 0.95);
            --accent: #3b82f6; --gold: #f59e0b; --safe: #10b981; --danger: #ef4444; --text: #ffffff;
            --gold-linear: linear-gradient(45deg, #d4af37, #f9e29c, #b8860b);
        }

        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: var(--bg); color: var(--text); margin: 0; 
            padding-bottom: 100px; /* مسافة للقائمة العائمة */
        }

        /* التصميم الجديد للقائمة العائمة (الكبسولية) */
        .floating-nav {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px); border-radius: 50px;
            display: flex; justify-content: space-around; align-items: center;
            padding: 10px 5px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); z-index: 9999;
        }

        .nav-item {
            display: flex; flex-direction: column; align-items: center;
            text-decoration: none; color: #555; transition: 0.3s; flex: 1; cursor: pointer;
        }

        .nav-item i { font-size: 18px; margin-bottom: 2px; }
        .nav-item span { font-size: 10px; font-weight: bold; }
        .nav-item.active { color: var(--accent); background: rgba(59, 130, 246, 0.1); border-radius: 30px; padding: 5px 0; }

        /* تنسيقات الأقسام والكروت المستوردة من ملفك */
        .section { display: none; padding: 16px; animation: slideUp 0.4s ease; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .card { background: var(--card); border-radius: 24px; padding: 18px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px; }
        .stat-card { background: rgba(255, 255, 255, 0.03); border-radius: 18px; padding: 15px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        .btn-premium-add { background: var(--gold-linear); color: #000; width: 100%; padding: 15px; border-radius: 50px; font-weight: 800; border: none; cursor: pointer; }
        .input-premium { width: 100%; background: var(--bg); border: 1px solid rgba(128,128,128,0.2); color: var(--text); padding: 12px; border-radius: 12px; margin-bottom: 12px; box-sizing: border-box; }
        
        .modal { display: none; position: fixed; z-index: 10000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); justify-content: center; align-items: center; }
        .modal-content { background: var(--bg); padding: 20px; border-radius: 25px; width: 90%; max-width: 400px; border: 2px solid var(--gold); }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<div class="main-content">
    <div id="sec-home" class="section" style="display: block;">
        <div class="card" style="text-align: center; border: 1px solid var(--accent);">
            <div style="font-size: 10px; color: var(--gold); font-weight: bold;">PREMIUM MEMBER</div>
            <small>إجمالي الرصيد (USDT)</small>
            <h1 id="bal-total" style="font-size: 38px; margin: 8px 0;">0.00</h1>
            <div class="stats-grid">
                <div class="stat-card"><small>قابل للسحب</small><br><b id="bal-avail" style="color:var(--safe);">0.00</b></div>
                <div class="stat-card"><small>مكافآت</small><br><b id="bal-bonus" style="color:var(--gold);">0.00</b></div>
            </div>
        </div>
    </div>

    <div id="sec-publisher" class="section">
        <h3 style="margin-bottom:15px;">📺 لوحة تحكم الناشر</h3>
        <div class="stats-grid">
            <div class="stat-card"><h4>النقرات</h4><p id="stat-clicks">0</p></div>
            <div class="stat-card"><h4>المشاهدات</h4><p id="stat-views">0</p></div>
        </div>
        <button class="btn-premium-add" onclick="togglePublisherPanel()">➕ إضافة قناة جديدة</button>
        <div id="publisher-panel" style="display:none; margin-top:15px;" class="card">
             <input type="text" id="ch-name" class="input-premium" placeholder="اسم قناتك">
             <input type="text" id="ch-link" class="input-premium" placeholder="رابط القناة @">
             <button class="btn-premium-add" style="background:var(--safe); color:white;" onclick="submitEliteChannel()">إرسال للمراجعة</button>
        </div>
    </div>

    <div id="sec-promo" class="section">
        <div class="card" style="background: var(--gold-linear); color: black;">
            <h3 style="margin:0;">🚀 مركز المعلنين</h3>
            <p style="font-size:11px;">أطلق حملتك الآن لتصل لآلاف المشتركين</p>
        </div>
        <button class="btn-premium-add" style="background:var(--accent); color:white; margin-top:15px;" onclick="openModal('modal-smart-campaign')">🎯 إنشاء حملة جديدة</button>
    </div>

    <div id="sec-admin" class="section">
        <h3 style="color:var(--danger);">🛠️ لوحة الإدارة</h3>
        <div class="card">
            <input type="text" id="adm-uid" class="input-premium" placeholder="User ID">
            <input type="number" id="adm-val" class="input-premium" placeholder="المبلغ">
            <button class="btn-premium-add" style="background:var(--danger); color:white;" onclick="adminAction('add')">تعديل الرصيد</button>
        </div>
    </div>
</div>

<div class="floating-nav">
    <div class="nav-item active" onclick="showTab('sec-home', this)">
        <i class="fas fa-home"></i><span>الرئيسية</span>
    </div>
    <div class="nav-item" onclick="showTab('sec-publisher', this)">
        <i class="fas fa-bullhorn"></i><span>الناشر</span>
    </div>
    <div class="nav-item" onclick="showTab('sec-promo', this)">
        <i class="fas fa-ad"></i><span>المعلن</span>
    </div>
    <div id="adm-nav-item" class="nav-item" style="display:none;" onclick="showTab('sec-admin', this)">
        <i class="fas fa-user-shield"></i><span>الإدارة</span>
    </div>
</div>

<div id="modal-smart-campaign" class="modal">
    <div class="modal-content">
        <span style="float:left; cursor:pointer;" onclick="closeModal()">✕</span>
        <h4>🎯 إعداد الحملة</h4>
        <textarea id="adv-text-manual" class="input-premium" placeholder="نص الإعلان"></textarea>
        <input type="text" id="adv-link-smart" class="input-premium" placeholder="رابط الزر">
        <button class="btn-premium-add" onclick="processNewCampaign()">إطلاق 🚀</button>
    </div>
</div>

<script>
    // إعدادات Firebase (تم الحفاظ عليها)
    const firebaseConfig = { databaseURL: "https://telega-io-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const tg = window.Telegram.WebApp;
    const user = tg.initDataUnsafe.user || { id: 549686235 };

    // تفعيل لوحة الإدارة لأمين فقط
    if(user.id.toString() === "549686235") document.getElementById('adm-nav-item').style.display = 'flex';

    // دالة التنقل الجديدة (تمنع التداخل)
    function showTab(tabId, element) {
        document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
        document.getElementById(tabId).style.display = 'block';
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        element.classList.add('active');
        tg.HapticFeedback.impactOccurred('light');
    }

    // --- الدوال الأصلية من ملفك (تم الحفاظ عليها دون تغيير) ---
    function togglePublisherPanel() {
        const p = document.getElementById('publisher-panel');
        p.style.display = p.style.display === 'none' ? 'block' : 'none';
    }

    function processNewCampaign() {
        const data = {
            text: document.getElementById('adv-text-manual').value,
            link: document.getElementById('adv-link-smart').value,
            owner: user.id, status: 'pending', created_at: Date.now()
        };
        db.ref('campaigns').push(data).then(() => {
            tg.showAlert("✅ تم الإرسال!");
            closeModal();
        });
    }

    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
</script>
</body>
</html>
