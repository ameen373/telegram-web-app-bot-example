<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منصة الناشر - أمين</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        /* --- التنسيق الأساسي والسمات --- */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            margin: 0;
            padding-bottom: 80px; /* مساحة للقائمة السفلية */
        }

        .section { display: none; padding: 16px; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- شبكة الإحصائيات (مثل الصورة المطلوبة) --- */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: var(--tg-theme-secondary-bg-color, #f4f4f5);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            border: 1px solid rgba(0,0,0,0.05);
        }

        .stat-card h4 { margin: 0; font-size: 11px; opacity: 0.8; }
        .stat-card .stat-value { font-size: 20px; font-weight: bold; margin: 8px 0; }
        .profit-tag { color: #31b545; font-size: 11px; font-weight: bold; }

        /* --- الأزرار والحقول --- */
        .btn-main {
            width: 100%;
            padding: 15px;
            background: var(--tg-theme-button-color, #248bcf);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 15px;
        }

        .input-premium {
            width: 100%;
            background: var(--tg-theme-bg-color, #fff);
            border: 1px solid rgba(0,0,0,0.1);
            color: var(--tg-theme-text-color);
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 10px;
            box-sizing: border-box;
        }

        /* --- القائمة السفلية --- */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: var(--tg-theme-secondary-bg-color);
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            border-top: 1px solid rgba(0,0,0,0.1);
            z-index: 1000;
        }

        .nav-item { font-size: 12px; opacity: 0.6; cursor: pointer; text-align: center; }
        .nav-item.active { opacity: 1; color: var(--tg-theme-link-color); font-weight: bold; }
    </style>
</head>
<body>

    <div id="sec-home" class="section" style="display: block; text-align: center;">
        <h2>مرحباً بك في المنصة</h2>
        <p>اختر "الناشر" من القائمة بالأسفل لإدارة قنواتك.</p>
    </div>

    <div id="sec-channels" class="section">
        <div class="stats-grid">
            <div class="stat-card" style="border-bottom: 3px solid #3498db;">
                <h4>🖱️ النقرات (CPC)</h4>
                <p id="stat-clicks" class="stat-value">0</p>
                <div class="profit-tag">الربح: $<span id="profit-clicks">0.00</span></div>
            </div>
            <div class="stat-card" style="border-bottom: 3px solid #31b545;">
                <h4>🚀 المشاهدات (CPM)</h4>
                <p id="stat-views" class="stat-value">0</p>
                <div class="profit-tag">الربح: $<span id="profit-views">0.00</span></div>
            </div>
            <div class="stat-card" style="border-bottom: 3px solid #9b59b6;">
                <h4>⏰ منشورات (24h)</h4>
                <p id="stat-timed" class="stat-value">0</p>
                <div class="profit-tag">الربح: $<span id="profit-timed">0.00</span></div>
            </div>
            <div class="stat-card" style="background: var(--tg-theme-button-color); color: #fff;">
                <h4 style="opacity: 0.9;">💰 الإجمالي الصافي</h4>
                <p style="font-size: 22px; margin: 5px 0;">$<span id="total-net-earnings">0.00</span></p>
            </div>
        </div>

        <button class="btn-main" onclick="togglePublisherPanel()">➕ إضافة قناة جديدة</button>

        <div id="publisher-panel" style="display: none; background: var(--tg-theme-secondary-bg-color); padding: 15px; border-radius: 12px;">
            <input type="text" id="ch-name" class="input-premium" placeholder="اسم القناة">
            <input type="text" id="ch-link" class="input-premium" placeholder="رابط القناة @">
            <input type="number" id="price-24h" class="input-premium" placeholder="سعر الإعلان (24 ساعة) $">
            
            <button onclick="submitEliteChannel()" class="btn-main" style="background: #31b545;">🚀 تقديم للمراجعة</button>
        </div>

        <h4>📺 قنواتك المسجلة:</h4>
        <div id="my-elite-channels"></div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" id="t-home" onclick="switchTab('home')">🏠 الرئيسية</div>
        <div class="nav-item" id="t-channels" onclick="switchTab('channels')">📺 الناشر</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // 1. نظام التنقل الموحد (يحل مشكلة تعطل الأزرار)
        function switchTab(tabId) {
            document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));

            const target = document.getElementById('sec-' + tabId);
            if (target) {
                target.style.display = 'block';
                document.getElementById('t-' + tabId).classList.add('active');
            }

            if (tabId === 'channels') {
                // استدعاء تحديث البيانات (تأكد من وجود userId و firebase)
                if (typeof updatePublisherStats === 'function') updatePublisherStats(tg.initDataUnsafe.user.id);
            }
            tg.HapticFeedback.impactOccurred('medium');
        }

        // 2. دوال الناشر
        function togglePublisherPanel() {
            const p = document.getElementById('publisher-panel');
            const isHidden = (p.style.display === 'none' || p.style.display === '');
            p.style.display = isHidden ? 'block' : 'none';
            tg.HapticFeedback.impactOccurred('light');
        }

        function updatePublisherStats(userId) {
            if (!userId || typeof db === 'undefined') return;
            db.ref('users/' + userId + '/stats').on('value', (snap) => {
                const d = snap.val() || {};
                const c = d.clicks || 0, v = d.views || 0, t = d.timed_posts || 0;
                
                const cp = c * 0.0045, vp = v * 0.0009, tp = parseFloat(d.timed_earnings || 0);

                document.getElementById('stat-clicks').innerText = c.toLocaleString();
                document.getElementById('profit-clicks').innerText = cp.toFixed(2);
                document.getElementById('stat-views').innerText = v.toLocaleString();
                document.getElementById('profit-views').innerText = vp.toFixed(2);
                document.getElementById('stat-timed').innerText = t;
                document.getElementById('profit-timed').innerText = tp.toFixed(2);
                document.getElementById('total-net-earnings').innerText = (cp + vp + tp).toFixed(2);
            });
        }

        function submitEliteChannel() {
            const n = document.getElementById('ch-name').value;
            const l = document.getElementById('ch-link').value;
            const p = document.getElementById('price-24h').value;

            if (!n || !l || !p) return tg.showAlert("⚠️ أكمل البيانات!");

            // كود الحفظ في Firebase يوضع هنا (بناءً على إعداداتك)
            tg.showAlert("✅ تم الإرسال للمراجعة");
            togglePublisherPanel();
        }
    </script>
</body>
</html>
