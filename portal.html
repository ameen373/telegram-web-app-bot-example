<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
  // تأكد من أن هذا الجزء يعمل بعد تحميل المكتبات أعلاه
  const firebaseConfig = {
    databaseURL: "https://telega-io-default-rtdb.firebaseio.com/"
  };

  // التحقق من تحميل Firebase لتجنب الشاشة السوداء
  if (typeof firebase !== 'undefined') {
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // ربط الأزرار
    window.onload = function() {
        const broadcastBtn = document.querySelector('.btn-primary');
        if(broadcastBtn) {
            broadcastBtn.onclick = function() {
                const msg = document.querySelector('textarea').value;
                if(msg) {
                    database.ref('global_notification').set({
                        msg: msg,
                        time: Date.now()
                    }).then(() => alert("✅ تم البث"));
                }
            };
        }
    };
  } else {
    console.error("Firebase labels not loaded");
  }
</script>
