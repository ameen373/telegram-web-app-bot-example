<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Telega-IO Enterprise</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root {
            --bg: #0f172a; --card: rgba(30, 41, 59, 0.7);
            --accent: #3b82f6; --gold: #f1c40f; --safe: #10b981; --text: #f1f5f9;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 90px; }
        .main-content { padding: 15px; }
        .card { background: var(--card); border-radius: 20px; padding: 15px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.06); backdrop-filter: blur(10px); }
        .nav-tabs { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(15, 23, 42, 0.95); display: flex; justify-content: space-around; padding: 12px; border-top: 1px solid rgba(255,255,255,0.1); z-index: 1000; }
        .tab-btn { flex: 1; text-align: center; color: rgba(255,255,255,0.5); font-size: 10px; cursor: pointer; }
        .tab-active { color: var(--accent); font-weight: bold; }
        .btn-main { width: 100%; padding: 12px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; background: var(--accent); color: white; margin-top: 8px; font-size: 13px; }
        .section { display: none; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .grid-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .stat-box { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 15px; text-align: center; border: 1px solid rgba(255,255,255,0.03); }
        .stat-num { display: block; font-size: 20px; font-weight: bold; color: var(--accent); }
    </style>
</head>
<body>

<div class="main-content">
    <div id="sec-home" class="section" style="display: block;">
        <div class="card" style="border: 1px solid var(--gold); text-align: center; background: linear-gradient(135deg, #1e293b, #0f172a);">
            <small>إجمالي الرصيد 💰</small>
            <h2 id="balance-home" style="margin: 5px 0; color: var(--gold);">0.00 USDT</h2>
        </div>

        <div class="card">
            <h4 style="margin-top:0; color: var(--accent);">📊 إحصائيات المنصة</h4>
            <div class="grid-stats">
                <div class="stat-box">
                    <span class="stat-num">48K</span>
                    <small>متابع نشط</small>
                </div>
                <div class="stat-box">
                    <span class="stat-num">1.2M</span>
                    <small>مشاهدة كلية</small>
                </div>
            </div>
        </div>

        <div class="card" style="border-right: 4px solid #ef4444;">
            <h4 style="margin:0; color: #ef4444;">🔥 عروض ساخنة</h4>
            <p style="font-size: 12px; margin: 8px 0;">تخفيض 25% على مساحات الإعلان في قنوات الدراما التركية الكبرى.</p>
            <button class="btn-main" style="background: #ef4444;" onclick="switchTab('promo')">اغتنم الفرصة</button>
        </div>

        <div class="card" style="border-right: 4px solid var(--gold);">
            <h4 style="margin:0; color: var(--gold);">💎 مزايا حصرية</h4>
            <p style="font-size: 12px; margin: 8px 0;">خاصية "الترويج السريع" متاحة الآن لأصحاب العضويات الذهبية فقط.</p>
            <button class="btn-main" style="background: var(--gold); color: #000;" onclick="tg.showAlert('قريباً لمستخدمي Pro')">اكتشف المزايا</button>
        </div>
    </div>

    <div id="sec-channels" class="section">...</div>
    <div id="sec-promo" class="section">...</div>
    <div id="sec-wallet" class="section">...</div>
</div>

<div class="nav-tabs">
    <div id="t-home" class="tab-btn tab-active" onclick="switchTab('home')">🏠 الرئيسية</div>
    <div id="t-channels" class="tab-btn" onclick="switchTab('channels')">📺 الناشر</div>
    <div id="t-promo" class="tab-btn" onclick="switchTab('promo')">📣 المعلن</div>
    <div id="t-wallet" class="tab-btn" onclick="switchTab('wallet')">💳 المحفظة</div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    const db = firebase.initializeApp({databaseURL: "https://telega-io-default-rtdb.firebaseio.com/"}).database();
    const user = tg.initDataUnsafe.user || { id: 549686235 };

    function switchTab(tabId) {
        document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-active'));
        document.getElementById('sec-' + tabId).style.display = 'block';
        document.getElementById('t-' + tabId).classList.add('tab-active');
        tg.HapticFeedback.impactOccurred('medium');
    }

    db.ref('wallets/' + user.id + '/balance').on('value', snap => {
        const val = (snap.val() || 0).toFixed(2) + " USDT";
        document.getElementById('balance-home').innerText = val;
    });

    tg.expand();
</script>
</body>
</html>
