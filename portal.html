<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Telega-IO Global Portal</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    
    <style>
        :root { --bg-color: #0e1621; --card-bg: #17212b; --primary: #2481cc; --accent: #ebaa16; --text: #ffffff; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg-color); color: var(--text); padding: 15px; margin: 0; }
        .card { background: var(--card-bg); border-radius: 15px; padding: 20px; margin-bottom: 15px; border: 1px solid #2b5278; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .btn { background: var(--primary); color: white; border: none; padding: 12px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn:active { transform: scale(0.98); }
        .btn-gold { background: var(--accent); color: #000; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .badge { background: #2b5278; padding: 4px 8px; border-radius: 5px; font-size: 0.8em; margin-bottom: 5px; display: inline-block; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #2b5278; background: #242f3d; color: white; box-sizing: border-box; }
        .contest-timer { color: var(--accent); font-weight: bold; text-align: center; font-size: 1.1em; }
        .ref-link-box { background: #1c2835; padding: 10px; border-radius: 8px; font-family: monospace; border: 1px dashed var(--primary); margin-top: 10px; word-break: break-all; }
        .tab-menu { display: flex; gap: 10px; margin-bottom: 15px; }
        .tab { flex: 1; text-align: center; padding: 10px; background: #242f3d; border-radius: 8px; font-size: 0.9em; }
        .tab.active { background: var(--primary); }
    </style>
</head>
<body>

    <div class="card" style="border-color: var(--accent);">
        <div class="badge">🏆 مسابقة الإحالة الكبرى (3 أشهر)</div>
        <p class="contest-timer" id="timer">جاري حساب الوقت...</p>
        <div class="stat-grid">
            <div style="text-align: center;">مركزك: <b id="user_rank">--</b></div>
            <div style="text-align: center;">نقاطك: <b id="user_points">0</b></div>
        </div>
    </div>

    <div class="card">
        <h3>💰 المحفظة المركزية</h3>
        <div class="stat-grid">
            <div>المتاح: <br><span id="balance" style="color: #4cd964; font-size: 1.2em;">0.00 USDT</span></div>
            <div>المحجوز: <br><span id="escrow" style="color: #ff3b30; font-size: 1.2em;">0.00 USDT</span></div>
        </div>
    </div>

    <div class="card">
        <h3>📢 إنشاء حملة إعلانية</h3>
        <label>رابط المنشور:</label>
        <input type="text" id="ad_link" placeholder="https://t.me/your_channel/123">
        
        <label>قسم القنوات المستهدفة:</label>
        <select id="ad_category">
            <option value="general">عام 🌐</option>
            <option value="cooking">الطبخ والحلويات 🍳</option>
            <option value="movies">الأفلام والمسلسلات 🎬</option>
            <option value="drama">الدراما التركية 🇹🇷</option>
            <option value="tech">التقنية 💻</option>
        </select>
        
        <button class="btn" onclick="createAd()">نشر الطلب بنظام الضمان</button>
    </div>

    <div class="card">
        <h3>🔗 برنامج الشركاء (Referral)</h3>
        <p style="font-size: 0.9em; color: #aaa;">ادعُ المعلنين والناشرين واحصل على عمولة تصل لـ 10% لمدة سنة كاملة!</p>
        <div class="ref-link-box" id="ref_link">https://t.me/Telega_Ads_bot?start=user_id</div>
        <button class="btn btn-gold" style="margin-top: 10px;" onclick="copyRef()">نسخ رابط الإحالة الخاص بك</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.enableClosingConfirmation();

        // إعدادات المسابقة
        const endDate = new Date("July 8, 2026 00:00:00").getTime();
        
        function updateTimer() {
            const now = new Date().getTime();
            const diff = endDate - now;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            document.getElementById("timer").innerHTML = `باقي: ${days} يوم و ${hours} ساعة`;
        }
        setInterval(updateTimer, 1000);

        // وظائف الأزرار
        function createAd() {
            const link = document.getElementById('ad_link').value;
            const cat = document.getElementById('ad_category').value;
            if(!link) { tg.showAlert("يرجى إدخال رابط الإعلان"); return; }
            
            tg.showConfirm(`هل تريد تأكيد حجز مبلغ الإعلان واستهداف قسم [${cat}]؟`, (ok) => {
                if(ok) {
                    // كود إرسال الطلب لـ Firebase
                    tg.showPopup({title: "تم!", message: "تم نشر طلبك، سيقوم أصحاب القنوات بالمزايدة الآن."});
                }
            });
        }

        function copyRef() {
            const link = document.getElementById('ref_link').innerText;
            navigator.clipboard.writeText(link);
            tg.showAlert("تم نسخ الرابط! انشره الآن وابدأ بربح العمولات.");
        }

        // إعداد رابط الإحالة الديناميكي
        document.getElementById('ref_link').innerText = `https://t.me/Telega_Ads_bot?start=${tg.initDataUnsafe.user.id}`;
    </script>
</body>
</html>
